version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sakhy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sakhy
      POSTGRES_PASSWORD: sakhy_dev_password
      POSTGRES_DB: sakhy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakhy -d sakhy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
